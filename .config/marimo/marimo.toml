[keymap]
preset = "vim"

[keymap.overrides]

[language_servers.basedpyright]
enabled = true

[language_servers.pylsp]
enable_ruff = true
enabled = true
enable_pyflakes = false
enable_pylint = false
enable_mypy = false
enable_flake8 = false
enable_pydocstyle = false

[ai.models]
displayed_models = []
custom_models = []

[ai.custom_providers]

[completion]
signature_hint_on_typing = true
activate_on_typing = true
copilot = "github"

[snippets]
include_default_snippets = true
custom_paths = []

[diagnostics]
sql_linter = true

[save]
format_on_save = false
autosave = "after_delay"
autosave_delay = 1000

[mcp]
presets = []

[mcp.mcpServers]

[display]
reference_highlighting = true
default_table_max_columns = 50
default_table_page_size = 10
cell_output = "below"
dataframes = "rich"
default_width = "full"
theme = "system"
code_editor_font_size = 12

[server]
follow_symlink = false
browser = "default"

[runtime]
auto_instantiate = false
reactive_tests = true
auto_reload = "off"
default_csv_encoding = "utf-8"
on_cell_change = "autorun"
default_sql_output = "auto"
output_max_bytes = 8000000
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000

[formatting]
line_length = 100

[package_management]
manager = "uv"
