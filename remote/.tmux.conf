# prefix: C-a (easier reach than C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# modern terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# pass OSC 52 clipboard escapes through to the outer terminal
set -g allow-passthrough on

# shell
set -g default-shell /bin/zsh

# no delay on escape (critical for vim/editor use)
set -sg escape-time 0

# history
set -g history-limit 50000

# 1-indexed (0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# mouse (scroll, resize, click to select pane)
set -g mouse on

# vi mode for copy
setw -g mode-keys vi

# splits that make spatial sense
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# new window inherits cwd
bind c new-window -c "#{pane_current_path}"

# pane nav (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# reload
bind r source-file ~/.tmux.conf \; display "reloaded"

# ── catppuccin mocha ──────────────────────────────────────
bg="#1a1a24"
fg="#cdd6f4"
accent="#89b4fa"
muted="#585b70"
surface="#313244"

set -g status-style "bg=$bg,fg=$fg"
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60

set -g status-left "#[fg=$bg,bg=$accent,bold] #S #[fg=$accent,bg=$bg] "
set -g status-right "#[fg=$muted]%H:%M "

setw -g window-status-format "#[fg=$muted] #I:#W "
setw -g window-status-current-format "#[fg=$accent,bold] #I:#W "

set -g pane-border-style "fg=$surface"
set -g pane-active-border-style "fg=$accent"
set -g message-style "bg=$surface,fg=$fg"
